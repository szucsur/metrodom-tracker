name: Temporary scraper probe

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to fetch and inspect"
        type: string
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and inspect
        run: |
          python3 - <<'PYEOF'
          import re
          import requests
          from bs4 import BeautifulSoup

          url = "${{ inputs.url }}"
          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                  "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"
              ),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "hu-HU,hu;q=0.9,en;q=0.8",
          }
          resp = requests.get(url, headers=headers, timeout=20)
          print("STATUS:", resp.status_code)
          print("LENGTH:", len(resp.text))

          soup = BeautifulSoup(resp.text, "html.parser")
          for keyword in ["Alapterület", "alapterulet", "Szobák sz", "szoba", "m²", "m2"]:
              for el in soup.find_all(string=re.compile(keyword, re.IGNORECASE)):
                  parent = el.parent
                  for _ in range(2):
                      if parent.parent:
                          parent = parent.parent
                  snippet = str(parent)[:500]
                  print(f"--- MATCH for '{keyword}' ---")
                  print(snippet)
          PYEOF
