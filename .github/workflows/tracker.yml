name: Metrodom Green rental tracker

on:
  schedule:
    # Runs hourly. GitHub only triggers `schedule` on the default branch.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Prevent overlapping runs (e.g. a manual workflow_dispatch firing close to
# the hourly schedule) from racing on the dedup-state git push. Queue
# rather than cancel, so a manual run never wipes out a scheduled one that
# already sent an email but hasn't committed yet.
concurrency:
  group: tracker

jobs:
  check-listings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONPATH: scripts
        run: python scripts/check_listings.py

      - name: Commit updated dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_listings.json
          git diff --cached --quiet || git commit -m "Update seen listings state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $attempt), rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 3))
          done
          echo "::error::git push failed after retries"
          exit 1
