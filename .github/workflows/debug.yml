name: Debug fetch (temporary diagnostic)

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium
      - name: Debug fetch (megveszlak.hu recon)
        run: python scripts/debug_fetch.py
      - name: Debug render with Playwright (oc.hu search flow)
        run: python scripts/debug_playwright.py
