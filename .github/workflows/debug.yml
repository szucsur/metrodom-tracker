name: Debug fetch (manual only)

on:
  workflow_dispatch: {}

jobs:
  debug-fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium
      - name: Debug fetch candidate URLs
        run: python scripts/debug_fetch.py
      - name: Debug render with Playwright
        run: python scripts/debug_playwright.py
