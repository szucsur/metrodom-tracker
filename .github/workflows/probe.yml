name: Temporary scraper probe

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to fetch and inspect"
        type: string
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and inspect
        run: |
          python3 - <<'PYEOF'
          import json
          import requests
          from bs4 import BeautifulSoup

          url = "${{ inputs.url }}"
          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                  "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"
              ),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "hu-HU,hu;q=0.9,en;q=0.8",
          }
          resp = requests.get(url, headers=headers, timeout=20)
          print("STATUS:", resp.status_code)
          print("LENGTH:", len(resp.text))

          soup = BeautifulSoup(resp.text, "html.parser")
          for script in soup.find_all("script", type="application/ld+json"):
              try:
                  data = json.loads(script.string)
              except (TypeError, ValueError):
                  continue
              if data.get("@type") == "ItemList":
                  print("=== ItemList JSON-LD (first item, full) ===")
                  print(json.dumps(data["itemListElement"][0], indent=2, ensure_ascii=False))
                  print(f"total items in list: {len(data['itemListElement'])}")

          import re
          links = [a for a in soup.find_all("a", href=True) if re.search(r"/h\d+$", a["href"])]
          print(f"listing detail links found: {len(links)}")
          seen_hrefs = set()
          for a in links:
              if a["href"] in seen_hrefs:
                  continue
              seen_hrefs.add(a["href"])
              print("--- LINK ---")
              print("href:", a["href"])
              print("classes:", a.get("class"))
              container = a
              for _ in range(5):
                  if container.parent:
                      container = container.parent
              print("ancestor(5) snippet:")
              print(str(container)[:2500])
              print()
          PYEOF
