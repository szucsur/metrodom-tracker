name: Temporary scraper probe

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to fetch and inspect"
        type: string
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and inspect
        run: |
          python3 - <<'PYEOF'
          import re
          import requests
          from bs4 import BeautifulSoup

          url = "${{ inputs.url }}"
          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                  "(KHTML, like Gecko) Chrome/124.0 Safari/537.36"
              ),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "hu-HU,hu;q=0.9,en;q=0.8",
          }
          resp = requests.get(url, headers=headers, timeout=20)
          print("STATUS:", resp.status_code)
          print("LENGTH:", len(resp.text))

          soup = BeautifulSoup(resp.text, "html.parser")

          UNIT_LINK_RE = re.compile(r"^(.+?)\s+-\s+([\w.]+)$")
          print("=== nav links matching 'Building - Unit' pattern ===")
          seen = set()
          for a in soup.find_all("a", href=True):
              text = a.get_text(strip=True)
              m = UNIT_LINK_RE.match(text)
              if m and a["href"] not in seen:
                  seen.add(a["href"])
                  print(repr(text), "->", a["href"])

          body = soup.find("body")
          text = re.sub(r"\s+", " ", body.get_text(" ", strip=True)) if body else ""
          print("=== body text (first 1500 chars) ===")
          print(text[:1500])
          PYEOF
